services:
  - type: web
    name: qml-dataflow-studio
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: waitress-serve --host=0.0.0.0 --port=$PORT --threads=4 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: LOG_LEVEL
        value: INFO
      - key: FLASK_DEBUG
        value: "false"
    autoDeploy: true
